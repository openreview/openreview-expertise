version: 2.1

parameters:
  openreview-api-v1-branch:
    type: string
    default: "master"
  openreview-api-v2-branch:
    type: string
    default: "main"

orbs:
  gcp-cli: circleci/gcp-cli@3.3.1

jobs:
  build:
    machine:
      image: ubuntu-2204:2022.10.2
    # The resource_class feature allows configuring CPU and RAM resources for each job. Different resource classes are available for different executors. https://circleci.com/docs/2.0/configuration-reference/#resourceclass
    resource_class: large
    parallelism: 1
    working_directory: ~/openreview-expertise
    environment:
      PYTHON_VERSION: 3.11
      GOOGLE_CLOUD_PROJECT: $GOOGLE_PROJECT_ID
      DEBIAN_FRONTEND: noninteractive
      NEEDRESTART_MODE: a
      NEEDRESTART_SUSPEND: "1"
    steps:
      - checkout
      - run:
          name: Install curl for GCP CLI
          command: |
            sudo apt update
            sudo apt install -y curl
      - gcp-cli/setup:
          google_project_id: GOOGLE_PROJECT_ID
          google_project_number: GOOGLE_PROJECT_NUMBER
          service_account_email: SERVICE_ACCOUNT_EMAIL
          use_oidc: true
          workload_identity_pool_id: WORKLOAD_IDENTITY_POOL_ID
          workload_identity_pool_provider_id: WORKLOAD_IDENTITY_POOL_PROVIDER_ID
      - run:
          name: "Verify Authentication"
          command: |
            gcloud auth list
            gcloud projects list
      - run:
          name: Install Python ${PYTHON_VERSION}
          command: |
            export APT_OPTS="NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive"
            sudo env $APT_OPTS apt-get update
            sudo env $APT_OPTS apt-get install -y software-properties-common
            sudo env $APT_OPTS add-apt-repository -y ppa:deadsnakes/ppa
            sudo env $APT_OPTS apt-get update
            sudo env $APT_OPTS apt-get install -y \
              python${PYTHON_VERSION} \
              python${PYTHON_VERSION}-venv \
              python${PYTHON_VERSION}-dev
            sudo env $APT_OPTS apt-get install -y wget make gcc curl build-essential git sudo
            sudo env $APT_OPTS TZ=Etc/UTC apt-get install -y tzdata
      - run:
          name: Install Node 22
          command: |
            sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get remove -y nodejs
            sudo rm -f /usr/local/bin/node /usr/local/bin/npm
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
            export PATH=/usr/bin:$PATH
            node -v
            npm -v
            sudo ln -sf /usr/bin/node /usr/local/bin/node
            sudo ln -sf /usr/bin/npm /usr/local/bin/npm
            which node
            whereis node
            which npm
            whereis npm
      - run:
          name: Setup environment
          command: |
            python${PYTHON_VERSION} -m venv ~/venv
            source ~/venv/bin/activate
            python -m pip install --upgrade pip setuptools wheel setuptools_rust
            python --version
            mkdir ~/expertise-utils
            cd ~/openreview-expertise
            pip install torch --index-url https://download.pytorch.org/whl/cu124
            pip install filelock
            pip install -e .
            pip install -I protobuf==3.20.1
            # Persist venv activation for subsequent steps
            echo "source ~/venv/bin/activate" >> "$BASH_ENV"
      - run:
          name: Download model artifacts from GCS bucket
          # Mirror the bucket path that Vertex AI pipeline workers use, so
          # `test_specter2scincl.py` / `test_spectermfr.py` exercise the same
          # code path in production (bucket -> local dir -> from_pretrained).
          # Covers MFR + all HuggingFace snapshots so nothing falls back to HF.
          command: |
            cd ~/openreview-expertise
            export AIP_STORAGE_URI="gs://openreview-expertise/expertise-utils/"
            export EXPERTISE_UTILS_DIR="$HOME/expertise-utils"
            python -c "
            from expertise.service import load_model_artifacts
            load_model_artifacts(subdirs=[
                'multifacet_recommender',
                'hf_models/specter',
                'hf_models/specter2_base',
                'hf_models/specter2_adapter',
                'hf_models/scincl',
            ])
            "
            # Persist env vars for the test step so predictors pick up the
            # local dirs instead of falling back to HuggingFace Hub.
            {
              echo "export SPECTER_HF_DIR=$HOME/expertise-utils/hf_models/specter"
              echo "export SPECTER2_HF_DIR=$HOME/expertise-utils/hf_models/specter2_base"
              echo "export SPECTER2_ADAPTER_DIR=$HOME/expertise-utils/hf_models/specter2_adapter"
              echo "export SCINCL_HF_DIR=$HOME/expertise-utils/hf_models/scincl"
            } >> "$BASH_ENV"
      - run:
          name: Initialize MongoDB
          command: |
            docker run -d --name mongodb -p 27017:27017 mongo:8.0 --replSet rs0
            sleep 10
            docker exec mongodb mongosh mongodb://localhost:27017 --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]})"
      - run:
          name: Start Elasticsearch
          command: |
            docker run -d --name elasticsearch -p 9200:9200 -p 9300:9300 -e "xpack.security.enabled=false" -e "discovery.type=single-node" docker.elastic.co/elasticsearch/elasticsearch:7.7.0
      - run:
          name: Start Redis
          command: |
            docker run -d --name redis -p 6379:6379 redislabs/redisai
      - run:
          name: Clone OpenReview API V1 branch << pipeline.parameters.openreview-api-v1-branch >>
          command: |
            git clone https://$OPENREVIEW_GITHUB@github.com/openreview/openreview-api-v1.git ~/openreview
            cd ~/openreview && git checkout << pipeline.parameters.openreview-api-v1-branch >>
      - run:
          name: Clone OpenReview API V2 branch << pipeline.parameters.openreview-api-v2-branch >>
          command: |
            git clone https://$OPENREVIEW_GITHUB@github.com/openreview/openreview-api.git ~/openreview-v2
            cd ~/openreview-v2 && git checkout << pipeline.parameters.openreview-api-v2-branch >>
      - run:
          name: Create API directories
          command: |
            mkdir -p ~/openreview/logs
            mkdir -p ~/openreview/files/attachments
            mkdir -p ~/openreview/files/pdfs
            mkdir -p ~/openreview/files/temp
            mkdir -p ~/openreview-v2/logs
            mkdir -p ~/openreview-v2/files/attachments
            mkdir -p ~/openreview-v2/files/pdfs
            mkdir -p ~/openreview-v2/files/temp
      - run:
          name: Start API V1
          command: |
            export PATH=/usr/bin:$PATH
            node -v
            which node
            whereis node
            which npm
            whereis npm
            cd ~/openreview
            /usr/local/bin/npm run cleanStart
          background: true
      - run:
          name: Wait for API V1 to start
          shell: /bin/sh
          command: |
            wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 10 http://localhost:3000
            :
      - run:
          name: Start API V2
          command: |
            export PATH=/usr/bin:$PATH
            node -v
            which node
            whereis node
            which npm
            whereis npm
            cd ~/openreview-v2
            /usr/local/bin/npm run cleanStart
          background: true
      - run:
          name: Wait for API V2 to start
          shell: /bin/sh
          command: |
            wget --retry-connrefused --waitretry=2 --read-timeout=20 --timeout=15 -t 45 http://localhost:3001
            :
      - run:
          name: Run tests
          command: |
            cd ~/openreview-expertise
            TEST_FILES=$(circleci tests glob "tests/test_*.py")
            mkdir reports
            mkdir reports/pytest
            echo "$TEST_FILES" | circleci tests run --command="xargs python -m pytest -x --junitxml=reports/pytest/pytest-report.xml --ignore=expertise" --verbose --split-by=timings
      - run:
          name: Build and test container locally
          command: |
            # Build image locally (no push)
            echo "Building Docker image locally..."
            docker build -t expertise-test:${CIRCLE_SHA1:0:12} .
            
            # Run container tests against local image
            # Note: Services are accessible via localhost from within remote docker
            echo "Running container tests..."
            docker run --network host \
              -e PYTHONUNBUFFERED=1 \
              -e DEBUG=1 \
              -e LOG_LEVEL=DEBUG \
              -e "GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT" \
              -v $(pwd)/test_output:/app/output \
              -v "$HOME/.config/gcloud:/root/.config/gcloud:ro" \
              -v "/home/circleci:/home/circleci:ro" \
              -v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS" \
              -e "GOOGLE_APPLICATION_CREDENTIALS" \
              --entrypoint="" \
              expertise-test:${CIRCLE_SHA1:0:12} \
              sh -c "cd /app/openreview-expertise && \
                     python -c 'from expertise.service import load_model_artifacts; load_model_artifacts(subdirs=[\"multifacet_recommender\", \"hf_models/specter\", \"hf_models/specter2_base\", \"hf_models/specter2_adapter\", \"hf_models/scincl\"])' && \
                     python -m pytest tests/test_pipeline.py tests/test_specter2scincl.py -v --tb=short"
      - run:
          name: Copy API logs to artifacts
          when: on_fail
          command: |
            cp ~/openreview/logs/* ~/openreview-expertise/reports/
            cp ~/openreview-v2/logs/* ~/openreview-expertise/reports/
      - store_test_results:
          path: reports
      - store_artifacts:
          when: always
          path: reports
